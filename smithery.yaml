name: latam-data-protection-mcp
description: LATAM data protection laws MCP — LGPD, LPDP, Law 1581, and privacy frameworks across 7 Latin American jurisdictions.
version: 0.1.0
author: Ansvar Systems AB
license: Apache-2.0
repository: https://github.com/Ansvar-Systems/latam-data-protection-mcp
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      LATAM_DATA_PROTECTION_DB_PATH:
        type: string
        description: Path to the SQLite database file
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@anthropic-ai/latam-data-protection-mcp'],
      env: config.LATAM_DATA_PROTECTION_DB_PATH ? { LATAM_DATA_PROTECTION_DB_PATH: config.LATAM_DATA_PROTECTION_DB_PATH } : {}
    })
